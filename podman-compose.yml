version: "3.8"

services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: standalone
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./postgres/keycloak_dump.sql:/keycloak_dump.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm", "--features=token-exchange"]
    restart: always
    env_file: .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: auth.gm-global-techies-town.club
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - kcdata:/opt/keycloak/data
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml
      - /run/user/1000/podman/podman.sock:/var/run/podman/podman.sock
      - ./keycloak/realm.json:/opt/realm/realm.json

  frontend:
    build: ./frontend
    restart: always
    env_file: .env
    depends_on:
      - backend
    ports:
      - "5174:5174"

  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/config.yml", "run"]
    restart: always
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/4f6ad36b-5a4a-4f31-9612-b11129f33205.json:/etc/cloudflared/4f6ad36b-5a4a-4f31-9612-b11129f33205.json:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--config", "/etc/cloudflared/config.yml", "ingress", "validate"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  kcdata:
